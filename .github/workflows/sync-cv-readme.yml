name: Sync CV filename to README

on:
  push:
    branches: [main]
    paths:
      - CV/**

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update CV download link in README
        run: |
          CV_FILE=$(ls CV/*.pdf 2>/dev/null | head -1)
          if [ -z "$CV_FILE" ]; then
            echo "No PDF found in CV/ — skipping"
            exit 0
          fi
          CV_NAME=$(basename "$CV_FILE")
          # Replace any existing CV filename in the README download link
          sed -i "s|CV/[^)]*\.pdf|CV/$CV_NAME|g" README.md
          if git diff --quiet README.md; then
            echo "README already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "sync: update CV link in README → $CV_NAME"
          git push
