<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Rishabh Singh</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/images/Logo.svg">
    <link rel="stylesheet" href="/css/style.css?v=2.3">
    <link rel="stylesheet" href="/css/skins/color-4.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-black-900);
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .error-container {
            max-width: 500px;
        }
        .error-logo {
            width: 80px;
            height: auto;
            margin-bottom: 24px;
            opacity: 0.8;
        }
        .error-code {
            font-size: 96px;
            font-weight: 800;
            color: var(--skin-color);
            line-height: 1;
            margin-bottom: 8px;
        }
        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-black-900);
            margin-bottom: 16px;
        }
        .error-message {
            font-size: 16px;
            color: var(--text-black-700);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .error-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body class="dark">
    <div class="error-container">
        <img src="/images/Logo.svg" alt="Rishabh Singh Portfolio Logo" class="error-logo">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
        <div class="error-links">
            <a href="/" class="btn">← Go Home</a>
            <a href="/blog/" class="btn btn-ghost">Read Blog</a>
        </div>
    </div>
</body>
</html>
