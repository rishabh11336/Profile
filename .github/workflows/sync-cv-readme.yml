name: Guard CV canonical filename

on:
  push:
    branches: [main]
    paths:
      - CV/**

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce canonical CV filename
        run: |
          CANONICAL="CV/Rishabh-Singh-Data-Scientist-CV.pdf"
          if [ ! -f "$CANONICAL" ]; then
            echo "ERROR: CV filename changed. The link https://rishabhsingh.me/CV/Rishabh-Singh-Data-Scientist-CV.pdf"
            echo "is shared with recruiters and external sites — renaming breaks every copy."
            echo "Rename your PDF back to: Rishabh-Singh-Data-Scientist-CV.pdf"
            exit 1
          fi
          echo "OK: canonical CV filename present"
